paths:
  .github/workflows/release.yml:
    ignore:
      # release.yml is autogenerated by cargo-dist; the project cannot fix
      # shellcheck findings without a dist template override.
      # SC2086 "Double quote to prevent globbing and word splitting" and
      # SC2129 "Consider using { cmd1; cmd2; } >> file" are style-level
      # suggestions in dist-emitted run-blocks. Tracked as a follow-up.
      - '.+SC2086.+'
      - '.+SC2129.+'
