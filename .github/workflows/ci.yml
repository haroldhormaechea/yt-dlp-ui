name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1 (stable)
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Install Linux native deps for wry
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libssl-dev
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1 (stable)
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Install Linux native deps for wry
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libssl-dev
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1 (stable)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc  # v2.9.1
      - run: cargo test --workspace

  scripts-bats:
    name: bats (scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run scripts/test-fetch-yt-dlp.bats
        run: bats scripts/test-fetch-yt-dlp.bats
      - name: Run scripts/test-fetch-ffmpeg.bats
        run: bats scripts/test-fetch-ffmpeg.bats

  scripts-pwsh:
    name: pwsh (scripts)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Run scripts/test-fetch-ps1.ps1
        shell: pwsh
        run: pwsh scripts/test-fetch-ps1.ps1
