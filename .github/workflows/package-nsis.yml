# package-nsis.yml — referenced workflow for the NSIS .exe packaging leg
# of UC 06's path-B installer matrix.
name: package-nsis

permissions: {}

on:
  workflow_call:
    inputs:
      plan:
        description: 'cargo-dist plan JSON (passed by dist-generated release.yml)'
        required: false
        type: string

jobs:
  package:
    name: NSIS installer
    runs-on: windows-latest

    env:
      # Microsoft Evergreen WebView2 Bootstrapper — the URL is stable but
      # Microsoft updates the binary in place periodically (it's the
      # always-latest installer). The SHA pin protects against an attacker
      # MITM'ing the download; if Microsoft rotates the bootstrapper, this
      # job will fail loudly and the bump procedure (re-pin SHA + PR) is
      # the same as for any other supply-chain pinned binary.
      WEBVIEW2_BOOTSTRAPPER_URL: "https://go.microsoft.com/fwlink/p/?LinkId=2124703"
      WEBVIEW2_BOOTSTRAPPER_SHA256: "cb9b76a6dace90f5d4635f2d49cbb55a62f41e5e365a22cef4265c013af0bcdd"
      YT_DLP_VERSION: "2026.03.17"
      DENO_VERSION: "2.7.14"

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install NSIS
        run: choco install nsis --no-progress --confirm

      # UC 24 (2026-05-09, third iteration): probe known paths for a gpg 2.x
      # binary on the Windows GHA runner image and prepend its directory to
      # PATH. Each NSIS package job runs on a fresh runner, so this probe
      # must happen here too — mirroring the (re-fetch — fresh runner)
      # pattern used by the yt-dlp / deno / ffmpeg fetches below. See the
      # full history-of-attempts comment block in ci/dist-build-setup.yml.
      - name: "Locate gpg 2.x on Windows runner (UC 24)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $candidates = @(
            'C:\Program Files\Git\usr\bin\gpg.exe',
            'C:\Program Files\Git\mingw64\bin\gpg.exe',
            'C:\Program Files (x86)\gnupg\bin\gpg.exe',
            'C:\Program Files\GnuPG\bin\gpg.exe'
          )

          $found = $null
          foreach ($cand in $candidates) {
            if (Test-Path -LiteralPath $cand) {
              try {
                $firstLine = (& $cand --version 2>&1 | Select-Object -First 1).ToString()
              } catch {
                Write-Host "Probed $cand but --version failed: $_"
                continue
              }
              Write-Host "Probed $cand -> $firstLine"
              if ($firstLine -match '\bgpg \(GnuPG\) 2\.') {
                $found = $cand
                break
              }
            } else {
              Write-Host "Probed $cand -> not present"
            }
          }

          if (-not $found) {
            throw "No gpg 2.x found at any known Windows path. Runner image may have changed; review the candidate list and update."
          }

          $foundDir = Split-Path -Parent $found
          Write-Host "Using gpg 2.x at: $found"
          Add-Content -Path $env:GITHUB_PATH -Value $foundDir

      - name: Smoke-check gpg availability (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = gpg --version
          if ($LASTEXITCODE -ne 0) { throw "gpg not on PATH after PATH-prepend" }
          $firstLine = $version | Select-Object -First 1
          if ($firstLine -notmatch '\bgpg \(GnuPG\) 2\.') {
            throw "Expected gpg 2.x on PATH, got: $firstLine"
          }
          Write-Host "gpg verified: $firstLine"

      - name: Download WebView2 Evergreen Bootstrapper
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:WEBVIEW2_BOOTSTRAPPER_URL -OutFile MicrosoftEdgeWebview2Setup.exe -UseBasicParsing
          $expected = $env:WEBVIEW2_BOOTSTRAPPER_SHA256
          $actual = (Get-FileHash MicrosoftEdgeWebview2Setup.exe -Algorithm SHA256).Hash.ToLower()
          if ($expected -ne $actual) {
              Write-Error "WebView2 bootstrap SHA mismatch: expected $expected, got $actual"
              exit 73
          }

      - name: Fetch yt-dlp + deno (re-fetch — fresh runner)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path runtime-deps | Out-Null
          pwsh scripts/fetch-yt-dlp.ps1 -TargetTriple x86_64-pc-windows-msvc -OutputDir runtime-deps/
          pwsh scripts/fetch-deno.ps1   -TargetTriple x86_64-pc-windows-msvc -OutputDir runtime-deps/

      - name: Fetch ffmpeg (re-fetch — fresh runner)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path runtime-deps | Out-Null
          pwsh scripts/fetch-ffmpeg.ps1 -TargetTriple x86_64-pc-windows-msvc -OutputDir runtime-deps/

      - name: Pull cargo-dist build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: artifacts-build-local-x86_64-pc-windows-msvc
          path: target/distrib/
          merge-multiple: true

      - name: Stage NSIS source dir
        shell: pwsh
        run: |
          $src = 'nsis-src'
          New-Item -ItemType Directory -Force -Path $src | Out-Null
          # Extract each dist-built .zip into its own temp dir under
          # $env:RUNNER_TEMP, then locate the binary via -Recurse. This is
          # robust against the cargo-dist Windows zip layout (which differs
          # from tar's and may flatten or nest depending on dist version).
          # Separate temp dirs avoid filename-collision risk between archives.
          $appExtract = Join-Path $env:RUNNER_TEMP 'nsis-app-extract'
          $adwExtract = Join-Path $env:RUNNER_TEMP 'nsis-adwindow-extract'
          New-Item -ItemType Directory -Force -Path $appExtract | Out-Null
          New-Item -ItemType Directory -Force -Path $adwExtract | Out-Null
          Expand-Archive -LiteralPath 'target/distrib/app-x86_64-pc-windows-msvc.zip'       -DestinationPath $appExtract -Force
          Expand-Archive -LiteralPath 'target/distrib/ad-window-x86_64-pc-windows-msvc.zip' -DestinationPath $adwExtract -Force

          $appBinary = Get-ChildItem -LiteralPath $appExtract -Recurse -Filter 'app.exe' | Select-Object -First 1
          if ($null -eq $appBinary) {
              throw "Could not locate app.exe inside app-x86_64-pc-windows-msvc.zip (extracted to $appExtract)"
          }
          $adwBinary = Get-ChildItem -LiteralPath $adwExtract -Recurse -Filter 'ad-window.exe' | Select-Object -First 1
          if ($null -eq $adwBinary) {
              throw "Could not locate ad-window.exe inside ad-window-x86_64-pc-windows-msvc.zip (extracted to $adwExtract)"
          }

          Copy-Item -LiteralPath $appBinary.FullName "$src/yt-dlp-ui.exe"
          Copy-Item -LiteralPath $adwBinary.FullName "$src/ad-window.exe"
          Copy-Item 'runtime-deps/yt-dlp' "$src/yt-dlp"
          Copy-Item 'runtime-deps/deno'   "$src/deno"
          Copy-Item 'runtime-deps/ffmpeg' "$src/ffmpeg"
          Copy-Item 'runtime-deps/ffmpeg-LICENSE.txt' "$src/ffmpeg-LICENSE.txt"
          Copy-Item 'installer/yt-dlp-LICENSE.txt'    "$src/yt-dlp-LICENSE.txt"
          Copy-Item 'LICENSE'             "$src/LICENSE"

      - name: Run makensis
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          # VIProductVersion requires X.X.X.X (four pure integers). Strip the
          # pre-release suffix (e.g. "-rc.2") then append ".0" for the build
          # component. "0.5.1-rc.2" → "0.5.1.0".
          $viVersion = ($version -replace '-.*$', '') + '.0'
          $src = (Resolve-Path 'nsis-src').Path
          $bootstrap = (Resolve-Path 'MicrosoftEdgeWebview2Setup.exe').Path
          & 'C:\Program Files (x86)\NSIS\makensis.exe' `
              "/DPRODUCT_VERSION=$version" `
              "/DPRODUCT_VI_VERSION=$viVersion" `
              "/DSOURCE_DIR=$src" `
              "/DWEBVIEW2_BOOTSTRAPPER=$bootstrap" `
              installer\yt-dlp-ui.nsi
          if ($LASTEXITCODE -ne 0) { throw "makensis failed with $LASTEXITCODE" }

      - name: Smoke-test installer layout
        shell: pwsh
        run: |
          pwsh installer/tests/test-nsis-extract.ps1 yt-dlp-ui-installer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: artifacts-package-nsis
          path: yt-dlp-ui-installer.exe
