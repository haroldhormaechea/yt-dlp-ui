rules:
  obfuscation:
    ignore:
      - release.yml           # cargo-dist autogenerated; not actual obfuscation.
  anonymous-definition:
    ignore:
      - release.yml           # cargo-dist autogenerates reusable jobs without `name:`.
  undocumented-permissions:
    ignore:
      - release.yml           # cargo-dist autogenerated.
  secrets-outside-env:
    ignore:
      - release.yml           # cargo-dist autogenerated.
  secrets-inherit:
    ignore:
      - release.yml           # cargo-dist autogenerated; pinning would be reverted on next `dist generate`.
  excessive-permissions:
    ignore:
      - release.yml           # cargo-dist autogenerated.
  template-injection:
    ignore:
      - release.yml           # cargo-dist autogenerated.
  unpinned-uses:
    config:
      policies:
        "*": hash-pin
    # cargo-dist's autogenerated release.yml uses floating action refs (@v6, @v4, etc.)
    # that cannot be SHA-pinned without re-running `dist generate --mode ci` reverting
    # the pins. Tracked as a follow-up: pursue cargo-dist template override / upstream PR.
    ignore:
      - release.yml
