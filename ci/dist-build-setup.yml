# dist-build-setup.yml — pre-build hook spliced into cargo-dist's
# `build-local-artifacts` job via `dist-workspace.toml::github-build-setup`.
#
# Survives `dist generate --mode ci`. Edit this file (NOT the regenerated
# release.yml) when changing release-time fetch behavior or pinned
# upstream-binary versions.
#
# Schema (cargo-dist 0.31.0): top-level YAML sequence of GHA-step maps.
# No top-level `env:` block; per-step `env:` is honored. The pinned
# YT_DLP_VERSION / DENO_VERSION are repeated on each step that needs them.
# Bumping is a manual PR — see scripts/README.md § Bump procedure.

# UC 22 (2026-05-09): Linux native deps for the cargo-dist `dist build
# --profile=dist` step in build-local-artifacts. This package set is a
# DELIBERATE STRICT SUPERSET of `.github/workflows/ci.yml`'s clippy/test
# install — `libgtk-3-dev` is the addition. It is required by `gdk-sys`
# v0.18.2 (transitively pulled by `rfd 0.15` at crates/app/Cargo.toml:53),
# which is only reachable from a full release-build compile. ci.yml's
# `cargo test` does not exercise the GTK paths reachable from `rfd`, which
# is why `libgtk-3-dev` is intentionally absent there.
#
# ANTI-CONSOLIDATION WARNING: do NOT "consolidate" by stripping
# `libgtk-3-dev` from this list to match ci.yml — that re-breaks the Linux
# Release build (gdk-sys: gdk-3.0 not found). The asymmetry is intentional.
# See use-cases/22-fix-linux-release-build.md.
- name: Install Linux native deps for wry + rfd (UC 22)
  if: runner.os == 'Linux'
  shell: bash
  run: |
    # Defensive sudo handling: GHA hosted runners have a non-root user with
    # passwordless sudo, but a future containerized-build transition would
    # run as root with no `sudo` binary present. `id -u` is a shell builtin
    # equivalent, available everywhere bash is.
    if [ "$(id -u)" = "0" ]; then
      SUDO=""
    else
      SUDO="sudo"
    fi
    $SUDO apt-get update
    $SUDO apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libssl-dev pkg-config build-essential

- name: Fetch yt-dlp + deno (Linux/macOS)
  if: runner.os == 'Linux' || runner.os == 'macOS'
  shell: bash
  env:
    YT_DLP_VERSION: "2026.03.17"
    DENO_VERSION: "2.7.14"
  run: |
    mkdir -p runtime-deps
    bash scripts/fetch-yt-dlp.sh "${{ matrix.targets[0] }}" runtime-deps/
    bash scripts/fetch-deno.sh   "${{ matrix.targets[0] }}" runtime-deps/

# UC 17: ffmpeg fetch. Linux uses the BtbN LGPL-only prebuilt; macOS
# builds from upstream FFmpeg source (no LGPL-only mainstream macOS
# prebuilt exists). Pins live in scripts/runtime-deps-pins.env so the
# ffmpeg version is NOT repeated as inline env: here (single source of
# truth for the SHA pin).
- name: Fetch ffmpeg (Linux)
  if: runner.os == 'Linux'
  shell: bash
  run: |
    mkdir -p runtime-deps
    bash scripts/fetch-ffmpeg.sh "${{ matrix.targets[0] }}" runtime-deps/

# UC 23 (2026-05-09): nasm provides the x86 SIMD assembler that ffmpeg's
# `./configure` auto-detects when targeting x86_64. arm64 doesn't strictly
# need it (no x86 asm path), but we install uniformly on every macOS runner
# rather than gating per-target — gating-by-arch inside a single job adds
# complexity without saving meaningful time. Cache-cold runners pay one
# ~10–30 s install; cache-warm runners short-circuit on `brew list` and
# pay essentially nothing. Idempotent: safe to re-run on rerun-with-cache.
# Must come BEFORE the ffmpeg build step below, since that step calls
# `./configure` which is where the missing-nasm error surfaces.
- name: "Install nasm (macOS) for ffmpeg x86_64 cross-build (UC 23)"
  if: runner.os == 'macOS'
  shell: bash
  run: |
    brew list nasm &>/dev/null || brew install nasm

- name: Build ffmpeg (macOS, LGPL-only, from source)
  if: runner.os == 'macOS'
  shell: bash
  run: |
    mkdir -p runtime-deps
    bash scripts/build-ffmpeg-macos.sh runtime-deps/

# UC 24 (2026-05-09, third iteration): probe known paths for a gpg 2.x
# binary on the Windows GHA runner image and prepend its directory to PATH.
#
# History on this step (all in one v0.5.0 push cycle):
#   1. Initial UC 24 tried `winget install --id GnuPG.GnuPG`. Failed — winget
#      is not on the SYSTEM PATH for the pwsh shell GHA invokes on the
#      windows-2022 runner image (`The term 'winget' is not recognized`).
#      Matched UC 24 Pitfall #1.
#   2. Rollback option (b) from the UC 24 commit body — detect gpg.exe at
#      `C:\Program Files\Git\mingw64\bin\gpg.exe`. Failed — modern Git for
#      Windows on the GHA runner ships gpg.exe at `usr\bin`, NOT
#      `mingw64\bin`. The UC 24 description's path assumption was outdated
#      for the current runner image.
#   3. (this) Probe multiple known paths, print version at each, fail
#      loudly only if NO candidate is gpg 2.x. Resilient to runner-image
#      drift and surfaces the actual paths/versions for future maintenance.
#
# UC 24's premise (Git for Windows ships gpg 1.4.x; need to install 2.x)
# was correct ~2018-2019 but is outdated for modern GfW. GfW 2.21+ (Jul 2019)
# ships gpg 2.x at usr\bin, and the runner has GfW 2.45+. The probe step
# converges on whichever path holds gpg 2.x without relying on an outdated
# shape claim.
- name: "Locate gpg 2.x on Windows runner (UC 24)"
  if: runner.os == 'Windows'
  shell: pwsh
  run: |
    $ErrorActionPreference = 'Stop'

    # Known paths where gpg 2.x may live on Windows runner images:
    # - Git for Windows 2.21+ (Jul 2019) ships gpg 2.x at usr\bin
    # - Older docs / some installs reference mingw64\bin
    # - winget / MSI installs of standalone GnuPG use Program Files paths
    $candidates = @(
      'C:\Program Files\Git\usr\bin\gpg.exe',
      'C:\Program Files\Git\mingw64\bin\gpg.exe',
      'C:\Program Files (x86)\gnupg\bin\gpg.exe',
      'C:\Program Files\GnuPG\bin\gpg.exe'
    )

    $found = $null
    foreach ($cand in $candidates) {
      if (Test-Path -LiteralPath $cand) {
        try {
          $firstLine = (& $cand --version 2>&1 | Select-Object -First 1).ToString()
        } catch {
          Write-Host "Probed $cand but --version failed: $_"
          continue
        }
        Write-Host "Probed $cand -> $firstLine"
        if ($firstLine -match '\bgpg \(GnuPG\) 2\.') {
          $found = $cand
          break
        }
      } else {
        Write-Host "Probed $cand -> not present"
      }
    }

    if (-not $found) {
      throw "No gpg 2.x found at any known Windows path. Runner image may have changed; review the candidate list and update."
    }

    $foundDir = Split-Path -Parent $found
    Write-Host "Using gpg 2.x at: $found"
    Add-Content -Path $env:GITHUB_PATH -Value $foundDir

- name: Smoke-check gpg availability (Windows)
  if: runner.os == 'Windows'
  shell: pwsh
  run: |
    $version = gpg --version
    if ($LASTEXITCODE -ne 0) { throw "gpg not on PATH after PATH-prepend" }
    $firstLine = $version | Select-Object -First 1
    if ($firstLine -notmatch '\bgpg \(GnuPG\) 2\.') {
      throw "Expected gpg 2.x on PATH, got: $firstLine"
    }
    Write-Host "gpg verified: $firstLine"

- name: Fetch yt-dlp + deno (Windows)
  if: runner.os == 'Windows'
  shell: pwsh
  env:
    YT_DLP_VERSION: "2026.03.17"
    DENO_VERSION: "2.7.14"
  run: |
    New-Item -ItemType Directory -Force -Path runtime-deps | Out-Null
    pwsh scripts/fetch-yt-dlp.ps1 -TargetTriple "${{ matrix.targets[0] }}" -OutputDir runtime-deps/
    pwsh scripts/fetch-deno.ps1   -TargetTriple "${{ matrix.targets[0] }}" -OutputDir runtime-deps/

- name: Fetch ffmpeg (Windows)
  if: runner.os == 'Windows'
  shell: pwsh
  run: |
    New-Item -ItemType Directory -Force -Path runtime-deps | Out-Null
    pwsh scripts/fetch-ffmpeg.ps1 -TargetTriple "${{ matrix.targets[0] }}" -OutputDir runtime-deps/
